<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 38px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #071827; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #526172; }
      .section-title { font: 700 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0d2235; }
      .box-title { font: 700 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #0d2235; }
      .box-text { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 11px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .tag { font: 700 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .lane { fill: #ffffff; stroke: #d8e1ec; stroke-width: 1.4; }
      .module { fill: #ffffff; stroke: #b7c6d8; stroke-width: 1.5; }
      .module-blue { fill: #eef6ff; stroke: #4f8fcf; stroke-width: 1.6; }
      .module-green { fill: #ecfdf3; stroke: #30a46c; stroke-width: 1.6; }
      .module-yellow { fill: #fff8e6; stroke: #d49a00; stroke-width: 1.6; }
      .module-red { fill: #fff1f2; stroke: #df3b57; stroke-width: 1.6; }
      .module-purple { fill: #f4f0ff; stroke: #8067c8; stroke-width: 1.6; }
      .control { fill: none; stroke: #16324f; stroke-width: 2.4; stroke-dasharray: 8 7; }
      .arrow { stroke: #294761; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #6b7f94; stroke-width: 1.7; fill: none; marker-end: url(#arrow-soft); }
      .arrow-red { stroke: #d32944; stroke-width: 2; fill: none; marker-end: url(#arrow-red); }
      .arrow-green { stroke: #1b8f59; stroke-width: 2; fill: none; marker-end: url(#arrow-green); }
      .check { fill: #108a54; }
      .warn { fill: #d32944; }
      .pill-green { fill: #dff8eb; stroke: #30a46c; }
      .pill-yellow { fill: #fff0bd; stroke: #d49a00; }
      .pill-red { fill: #ffe2e7; stroke: #df3b57; }
      .pill-blue { fill: #e2f1ff; stroke: #4f8fcf; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#294761"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#6b7f94"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#d32944"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#1b8f59"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1260"/>

  <text class="title" x="54" y="64">Quant Research OS：子模块组成与闭环系统架构</text>
  <text class="subtitle" x="56" y="96">A 股全市场因子研究系统 · 现有 canonical 模块、控制边界、Loop 断点与后续落地顺序</text>

  <rect class="pill-green" x="1260" y="40" width="118" height="28" rx="14"/>
  <text class="tag check" x="1280" y="59">已强约束</text>
  <rect class="pill-yellow" x="1390" y="40" width="118" height="28" rx="14"/>
  <text class="tag" x="1410" y="59" fill="#8a5a00">部分闭环</text>
  <rect class="pill-red" x="1520" y="40" width="118" height="28" rx="14"/>
  <text class="tag warn" x="1540" y="59">当前断点</text>
  <rect class="pill-blue" x="1650" y="40" width="108" height="28" rx="14"/>
  <text class="tag" x="1669" y="59" fill="#2563a5">建议新增</text>

  <!-- Outer governance boundary -->
  <rect class="control" x="34" y="125" width="1732" height="920" rx="24"/>
  <text class="section-title" x="58" y="158">Governance Control Plane（外层控制面）</text>
  <text class="small" x="58" y="182">统一约束：holdout 金库、trial ledger、DSR、多重检验、审批点、registry 唯一入口、生产准入与退役纪律</text>

  <!-- Lanes -->
  <rect class="lane" x="58" y="210" width="1684" height="132" rx="16"/>
  <text class="section-title" x="78" y="238">1. Data Layer / Data Loop</text>

  <rect class="lane" x="58" y="366" width="1684" height="150" rx="16"/>
  <text class="section-title" x="78" y="394">2. Hypothesis &amp; Candidate Factory / Hypothesis Loop</text>

  <rect class="lane" x="58" y="540" width="1684" height="158" rx="16"/>
  <text class="section-title" x="78" y="568">3. Experiment Layer / Experiment Loop</text>

  <rect class="lane" x="58" y="722" width="1684" height="150" rx="16"/>
  <text class="section-title" x="78" y="750">4. Evaluation Layer / Evaluation Loop</text>

  <rect class="lane" x="58" y="896" width="1684" height="130" rx="16"/>
  <text class="section-title" x="78" y="924">5. Memory, Registry &amp; Production / Memory Loop + Production Monitoring</text>

  <!-- Data Layer modules -->
  <rect class="module-blue" x="92" y="254" width="190" height="66" rx="10"/>
  <text class="box-title" x="112" y="281">外部数据源</text>
  <text class="box-text" x="112" y="303">Tushare / 腾讯 / ETF</text>
  <text class="tiny" x="112" y="318">公告、财务、价量、研报 PDF</text>

  <rect class="module-green" x="322" y="254" width="210" height="66" rx="10"/>
  <text class="box-title" x="342" y="281">lake/ + scripts/data</text>
  <text class="box-text" x="342" y="303">canonical writer</text>
  <text class="tiny" x="342" y="318">PIT 对齐 / schema / 增量</text>

  <rect class="module-green" x="572" y="254" width="220" height="66" rx="10"/>
  <text class="box-title" x="592" y="281">data_lake/</text>
  <text class="box-text" x="592" y="303">全市场数据湖</text>
  <text class="tiny" x="592" y="318">price / financials / factor_store</text>

  <rect class="module-green" x="832" y="254" width="240" height="66" rx="10"/>
  <text class="box-title" x="852" y="281">manifest + fingerprint</text>
  <text class="box-text" x="852" y="303">数据版本与内容指纹</text>
  <text class="tiny" x="852" y="318">实验可复现证据</text>

  <rect class="module-yellow" x="1112" y="254" width="230" height="66" rx="10"/>
  <text class="box-title" x="1132" y="281">quality_report</text>
  <text class="box-text" x="1132" y="303">缺失、异常、新鲜度</text>
  <text class="tiny" x="1132" y="318">已有检查，事件化不足</text>

  <rect class="module-red" x="1382" y="248" width="310" height="78" rx="10"/>
  <text class="box-title warn" x="1402" y="274">断点 D1：Data Loop 未统一事件化</text>
  <text class="box-text" x="1402" y="298">数据健康结果未全部写入统一</text>
  <text class="box-text" x="1402" y="315">loop_events，难以驱动下游节拍</text>

  <!-- Hypothesis Layer modules -->
  <rect class="module-blue" x="92" y="414" width="200" height="76" rx="10"/>
  <text class="box-title" x="112" y="440">假设输入</text>
  <text class="box-text" x="112" y="462">市场变化 / 行业事件</text>
  <text class="tiny" x="112" y="479">研报 NLP / 历史失败库</text>

  <rect class="module-green" x="332" y="414" width="220" height="76" rx="10"/>
  <text class="box-title" x="352" y="440">factory/autoresearch</text>
  <text class="box-text" x="352" y="462">DSL registry / validator</text>
  <text class="tiny" x="352" y="479">islands / walkforward / novelty</text>

  <rect class="module-green" x="592" y="414" width="220" height="76" rx="10"/>
  <text class="box-title" x="612" y="440">Candidate Repository</text>
  <text class="box-text" x="612" y="462">candidates.jsonl</text>
  <text class="tiny" x="612" y="479">fingerprint / provenance</text>

  <rect class="module-yellow" x="852" y="414" width="230" height="76" rx="10"/>
  <text class="box-title" x="872" y="440">LLM 生成器</text>
  <text class="box-text" x="872" y="462">DeepSeek = 候选燃料</text>
  <text class="tiny" x="872" y="479">不判 alpha，不做裁决</text>

  <rect class="module-yellow" x="1122" y="414" width="230" height="76" rx="10"/>
  <text class="box-title" x="1142" y="440">metasearch / 失败反思</text>
  <text class="box-text" x="1142" y="462">冗余簇 / 空白区 / 被丢信号</text>
  <text class="tiny" x="1142" y="479">回流有雏形，结构化不足</text>

  <rect class="module-red" x="1392" y="406" width="300" height="92" rx="10"/>
  <text class="box-title warn" x="1412" y="432">断点 D2：Hypothesis 回流不完整</text>
  <text class="box-text" x="1412" y="456">失败原因、适用 regime、参数敏感性</text>
  <text class="box-text" x="1412" y="473">未稳定转成下一轮生成约束</text>
  <text class="tiny" x="1412" y="490">建议：Memory → prompt seed contract</text>

  <!-- Experiment Layer modules -->
  <rect class="module-blue" x="92" y="594" width="190" height="76" rx="10"/>
  <text class="box-title" x="112" y="620">Hypothesis → DSL</text>
  <text class="box-text" x="112" y="642">ast_to_hypothesis</text>
  <text class="tiny" x="112" y="659">leakage guard / provenance</text>

  <rect class="module-green" x="322" y="594" width="200" height="76" rx="10"/>
  <text class="box-title" x="342" y="620">L0</text>
  <text class="box-text" x="342" y="642">Rank IC / ICIR 快筛</text>
  <text class="tiny" x="342" y="659">cheap-first，不直接入册</text>

  <rect class="module-green" x="562" y="594" width="200" height="76" rx="10"/>
  <text class="box-title" x="582" y="620">L1</text>
  <text class="box-text" x="582" y="642">快回测 / 成本初筛</text>
  <text class="tiny" x="582" y="659">统一引擎口径</text>

  <rect class="module-green" x="802" y="594" width="200" height="76" rx="10"/>
  <text class="box-title" x="822" y="620">L2 / L3</text>
  <text class="box-text" x="822" y="642">稳健性 / WF / 压力段</text>
  <text class="tiny" x="822" y="659">run_id + data fingerprint</text>

  <rect class="module-green" x="1042" y="594" width="230" height="76" rx="10"/>
  <text class="box-title" x="1062" y="620">workflow/promote</text>
  <text class="box-text" x="1062" y="642">phase1 → phase4</text>
  <text class="tiny" x="1062" y="659">防未来审计 + 登记材料</text>

  <rect class="module-red" x="1312" y="580" width="380" height="104" rx="10"/>
  <text class="box-title warn" x="1332" y="606">断点 D3：Experiment Artifact Contract 缺失</text>
  <text class="box-text" x="1332" y="630">实验产物尚未形成统一对象：run_id、输入数据指纹、</text>
  <text class="box-text" x="1332" y="647">候选 AST、参数、n_trials、日志、结果摘要。</text>
  <text class="tiny" x="1332" y="666">后果：Evaluation 难以只读裁决，审计链分散。</text>

  <!-- Evaluation Layer modules -->
  <rect class="module-green" x="92" y="776" width="220" height="70" rx="10"/>
  <text class="box-title" x="112" y="802">core.engine</text>
  <text class="box-text" x="112" y="824">BacktestEngine 唯一权威</text>
  <text class="tiny" x="112" y="840">成本、T+1、统一回测口径</text>

  <rect class="module-green" x="352" y="776" width="220" height="70" rx="10"/>
  <text class="box-title" x="372" y="802">core/analysis</text>
  <text class="box-text" x="372" y="824">nine_gates / DSR / PBO</text>
  <text class="tiny" x="372" y="840">是否有效只由代码判断</text>

  <rect class="module-green" x="612" y="776" width="220" height="70" rx="10"/>
  <text class="box-title" x="632" y="802">governance/holdout</text>
  <text class="box-text" x="632" y="824">金库边界 / peek 计数</text>
  <text class="tiny" x="632" y="840">晋级前唯一校验</text>

  <rect class="module-green" x="872" y="776" width="220" height="70" rx="10"/>
  <text class="box-title" x="892" y="802">capacity / marginal</text>
  <text class="box-text" x="892" y="824">容量、拥挤度、边际贡献</text>
  <text class="tiny" x="892" y="840">避免同质 alpha 堆叠</text>

  <rect class="module-yellow" x="1132" y="776" width="230" height="70" rx="10"/>
  <text class="box-title" x="1152" y="802">style / exposure audit</text>
  <text class="box-text" x="1152" y="824">行业、风格、中性化</text>
  <text class="tiny" x="1152" y="840">已有工具，裁决入口待统一</text>

  <rect class="module-red" x="1402" y="762" width="290" height="98" rx="10"/>
  <text class="box-title warn" x="1422" y="788">断点 D4：独立 Evaluation API 不够清晰</text>
  <text class="box-text" x="1422" y="812">需要固定为只读实验产物，输出裁决报告；</text>
  <text class="box-text" x="1422" y="829">Experiment 不得自己声明 alpha 有效。</text>
  <text class="tiny" x="1422" y="848">建议：EvaluationReport + policy verdict</text>

  <!-- Memory/Registry/Production Layer modules -->
  <rect class="module-yellow" x="92" y="948" width="220" height="58" rx="10"/>
  <text class="box-title" x="112" y="973">research_ledger</text>
  <text class="box-text" x="112" y="994">append-only 研究事件</text>

  <rect class="module-green" x="352" y="948" width="210" height="58" rx="10"/>
  <text class="box-title" x="372" y="973">trial_ledger</text>
  <text class="box-text" x="372" y="994">诚实 n_trials</text>

  <rect class="module-yellow" x="602" y="948" width="220" height="58" rx="10"/>
  <text class="box-title" x="622" y="973">LESSONS / pending_lessons</text>
  <text class="box-text" x="622" y="994">失败原因与经验沉淀</text>

  <rect class="module-green" x="862" y="948" width="220" height="58" rx="10"/>
  <text class="box-title" x="882" y="973">strategy_registry</text>
  <text class="box-text" x="882" y="994">唯一入册写入口</text>

  <rect class="module-yellow" x="1122" y="948" width="220" height="58" rx="10"/>
  <text class="box-title" x="1142" y="973">production / paper</text>
  <text class="box-text" x="1142" y="994">run_daily / paper_trade / decay</text>

  <rect class="module-yellow" x="1382" y="940" width="310" height="74" rx="10"/>
  <text class="box-title" x="1402" y="966">web dashboards</text>
  <text class="box-text" x="1402" y="988">数据健康、因子研究、回测实验、治理面板</text>
  <text class="tiny" x="1402" y="1004">展示较完整，闭环控制 API 仍需补</text>

  <!-- Flow arrows -->
  <path class="arrow" d="M282 287 L322 287"/>
  <path class="arrow" d="M532 287 L572 287"/>
  <path class="arrow" d="M792 287 L832 287"/>
  <path class="arrow" d="M1072 287 L1112 287"/>
  <path class="arrow-soft" d="M1227 320 C1227 352, 190 350, 190 414"/>

  <path class="arrow" d="M292 452 L332 452"/>
  <path class="arrow" d="M552 452 L592 452"/>
  <path class="arrow" d="M812 452 L852 452"/>
  <path class="arrow-soft" d="M1082 452 L1122 452"/>
  <path class="arrow-soft" d="M702 490 C702 530, 187 530, 187 594"/>

  <path class="arrow" d="M282 632 L322 632"/>
  <path class="arrow" d="M522 632 L562 632"/>
  <path class="arrow" d="M762 632 L802 632"/>
  <path class="arrow" d="M1002 632 L1042 632"/>
  <path class="arrow-soft" d="M1157 670 C1157 713, 202 713, 202 776"/>

  <path class="arrow" d="M312 811 L352 811"/>
  <path class="arrow" d="M572 811 L612 811"/>
  <path class="arrow" d="M832 811 L872 811"/>
  <path class="arrow" d="M1092 811 L1132 811"/>
  <path class="arrow-soft" d="M720 846 C720 890, 202 890, 202 948"/>
  <path class="arrow-soft" d="M1247 846 C1247 890, 972 890, 972 948"/>

  <path class="arrow" d="M312 977 L352 977"/>
  <path class="arrow" d="M562 977 L602 977"/>
  <path class="arrow" d="M822 977 L862 977"/>
  <path class="arrow" d="M1082 977 L1122 977"/>
  <path class="arrow" d="M1342 977 L1382 977"/>

  <!-- Feedback loop from memory to hypothesis -->
  <path class="arrow-green" d="M712 948 C710 900, 46 890, 46 452 C46 382, 92 382, 128 414"/>
  <text class="small" x="76" y="870" fill="#1b8f59">Memory → Hypothesis 反馈：失败模式、有效 regime、参数敏感性</text>

  <!-- Governance callouts -->
  <rect class="module-green" x="90" y="1068" width="235" height="78" rx="10"/>
  <text class="box-title" x="110" y="1094">已强约束 G1</text>
  <text class="box-text" x="110" y="1116">BacktestEngine 唯一权威</text>
  <text class="box-text" x="110" y="1133">registry 唯一写入口</text>

  <rect class="module-green" x="355" y="1068" width="235" height="78" rx="10"/>
  <text class="box-title" x="375" y="1094">已强约束 G2</text>
  <text class="box-text" x="375" y="1116">9-Gate / DSR / PBO</text>
  <text class="box-text" x="375" y="1133">holdout 金库 + trial ledger</text>

  <rect class="module-red" x="620" y="1068" width="275" height="78" rx="10"/>
  <text class="box-title warn" x="640" y="1094">断点 D5：统一 Loop OS 缺失</text>
  <text class="box-text" x="640" y="1116">没有 factor_research/loops/</text>
  <text class="box-text" x="640" y="1133">统一编排、事件账本、状态机</text>

  <rect class="module-red" x="925" y="1068" width="285" height="78" rx="10"/>
  <text class="box-title warn" x="945" y="1094">断点 D6：Governance Policy API 缺失</text>
  <text class="box-text" x="945" y="1116">预算、Token、实验数量、审批点</text>
  <text class="box-text" x="945" y="1133">尚未由统一 policy 决定</text>

  <rect class="module-red" x="1240" y="1068" width="305" height="78" rx="10"/>
  <text class="box-title warn" x="1260" y="1094">断点 D7：Production Monitoring 回流不足</text>
  <text class="box-text" x="1260" y="1116">实盘漂移、成交偏差、容量恶化</text>
  <text class="box-text" x="1260" y="1133">需反哺 Memory / Governance</text>

  <rect class="module-blue" x="1575" y="1068" width="167" height="78" rx="10"/>
  <text class="box-title" x="1595" y="1094">新增入口</text>
  <text class="box-text" x="1595" y="1116">apps/loop_cli.py</text>
  <text class="box-text" x="1595" y="1133">daily / weekly / audit</text>

  <!-- Roadmap -->
  <rect class="module" x="58" y="1172" width="1684" height="56" rx="14"/>
  <text class="section-title" x="78" y="1205">落地顺序：</text>
  <text class="box-text" x="190" y="1205">1 薄 Orchestrator + loop_events.jsonl</text>
  <text class="box-text" x="510" y="1205">2 ExperimentArtifact / EvaluationReport 契约</text>
  <text class="box-text" x="900" y="1205">3 Memory 结构化回流</text>
  <text class="box-text" x="1120" y="1205">4 GovernancePolicy API</text>
  <text class="box-text" x="1340" y="1205">5 Production Monitor → Memory/Governance</text>
</svg>
