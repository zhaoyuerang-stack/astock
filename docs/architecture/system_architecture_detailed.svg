  <!-- Guards -->
  <rect class="guard" x="1335" y="565" width="305" height="110"/>
  <text class="box-title" x="1353" y="590">CI / 守卫</text>
  <text class="box-text" x="1353" y="612">scripts/ci/check_layer_deps.py</text>
  <text class="box-text" x="1353" y="630">check_lake_writers / holdout / registry evidence</text>
  <text class="box-text" x="1353" y="648">check_no_legacy_data / scripts/test_all.sh</text>

  <text class="note" x="60" y="1260">边界：data(lake) → factors → core.engine → strategies / factory / workflow → registry → production → services → api → web。生产不依赖研究探索层；API 不直接读写运行产物。</text>
