<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">系统整体架构图与自动化流程</title>
  <desc id="desc">A deterministic architecture diagram of the factor research platform, showing data, research, automation, registry, production, services, API, web, and runtime control layers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #64748b; }
      .label { font: 700 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif; fill: #0f766e; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 16; }
      .data { fill: #eff6ff; stroke: #93c5fd; }
      .core { fill: #f8fafc; stroke: #94a3b8; }
      .auto-band { fill: #ecfdf5; stroke: #14b8a6; stroke-width: 2; rx: 18; }
      .auto { fill: #f0fdfa; stroke: #2dd4bf; }
      .prod { fill: #fff7ed; stroke: #fdba74; }
      .risk { fill: #fef2f2; stroke: #fca5a5; }
      .registry { fill: #fefce8; stroke: #facc15; }
      .store { fill: #f1f5f9; stroke: #94a3b8; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-thin { fill: none; stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); }
      .arrow-auto { fill: none; stroke: #0f766e; stroke-width: 2.2; marker-end: url(#arrow-teal); }
      .arrow-prod { fill: none; stroke: #c2410c; stroke-width: 2.1; marker-end: url(#arrow-orange); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1180"/>
  <text class="title" x="70" y="58">系统整体架构图</text>
  <text class="subtitle" x="70" y="92">基于代码模块关系绘制；绿色区域为当前自动化流水线，黄色为唯一策略台账写入口。</text>

  <!-- External and data layer -->
  <rect class="layer" x="55" y="125" width="1690" height="140"/>
  <text class="section-title" x="80" y="157">1. 数据输入与数据湖</text>
  <rect class="data" x="85" y="178" width="270" height="62" rx="10"/>
  <text class="box-title" x="105" y="202">外部数据源</text>
  <text class="box-text" x="105" y="224">Tushare / Tencent / Exchange</text>
  <rect class="data" x="405" y="178" width="315" height="62" rx="10"/>
  <text class="box-title" x="425" y="202">data_lake/</text>
  <text class="box-text" x="425" y="224">price / financials / macro / research_signals</text>
  <rect class="data" x="770" y="178" width="315" height="62" rx="10"/>
  <text class="box-title" x="790" y="202">lake/</text>
  <text class="box-text" x="790" y="224">load / validate / aggregate / fingerprint</text>
  <rect class="store" x="1135" y="178" width="250" height="62" rx="10"/>
  <text class="box-title" x="1155" y="202">quality / invariants</text>
  <text class="box-text" x="1155" y="224">quality_report / quarantine</text>
  <rect class="data" x="1435" y="178" width="265" height="62" rx="10"/>
  <text class="box-title" x="1455" y="202">人工研究输入</text>
  <text class="box-text" x="1455" y="224">research_pdf / manual notes</text>
  <path class="arrow" d="M355 209 H405"/>
  <path class="arrow" d="M720 209 H770"/>
  <path class="arrow-thin" d="M1085 209 H1135"/>
  <path class="arrow-thin" d="M1435 209 H1385"/>

  <!-- Compute layer -->
  <rect class="layer" x="55" y="295" width="1690" height="145"/>
  <text class="section-title" x="80" y="327">2. 研究计算内核</text>
  <rect class="core" x="85" y="350" width="250" height="62" rx="10"/>
  <text class="box-title" x="105" y="374">factors/</text>
  <text class="box-text" x="105" y="396">alpha / DSL / veto / fundamental</text>
  <rect class="core" x="385" y="350" width="310" height="62" rx="10"/>
  <text class="box-title" x="405" y="374">core.engine.BacktestEngine</text>
  <text class="box-text" x="405" y="396">成本 / 融资 / 指标 / 权重执行</text>
  <rect class="core" x="745" y="350" width="245" height="62" rx="10"/>
  <text class="box-title" x="765" y="374">strategies/</text>
  <text class="box-text" x="765" y="396">small_cap / hq / large_cap</text>
  <rect class="core" x="1040" y="350" width="255" height="62" rx="10"/>
  <text class="box-title" x="1060" y="374">factory/</text>
  <text class="box-text" x="1060" y="396">ontology / pool / lines</text>
  <rect class="core" x="1345" y="350" width="160" height="62" rx="10"/>
  <text class="box-title" x="1365" y="374">knowledge/</text>
  <text class="box-text" x="1365" y="396">findings graph</text>
  <rect class="core" x="1535" y="350" width="165" height="62" rx="10"/>
  <text class="box-title" x="1555" y="374">research_ledger</text>
  <text class="box-text" x="1555" y="396">实验记录</text>
  <path class="arrow" d="M210 240 V350"/>
  <path class="arrow" d="M928 240 V350"/>
  <path class="arrow" d="M335 381 H385"/>
  <path class="arrow" d="M695 381 H745"/>
  <path class="arrow" d="M990 381 H1040"/>

  <!-- Automation band -->
  <rect class="auto-band" x="55" y="470" width="1690" height="380"/>
  <text class="section-title" x="80" y="503">3. 自动化流水线层</text>
  <text class="label" x="1480" y="503">当前自动化核心</text>

  <!-- Ops automation -->
  <rect class="auto" x="85" y="530" width="500" height="135" rx="12"/>
  <text class="box-title" x="110" y="557">生产自动化 / scripts/ops</text>
  <text class="box-text" x="110" y="584">scheduled_daily_update → update_lake → validate</text>
  <text class="box-text" x="110" y="607">run_daily → signals/YYYY-MM-DD.json</text>
  <text class="box-text" x="110" y="630">paper_trade / health_check / weekly_maintenance</text>

  <!-- Research automation -->
  <rect class="auto" x="635" y="530" width="500" height="135" rx="12"/>
  <text class="box-title" x="660" y="557">AutoResearch 搜索 / factory.autoresearch</text>
  <text class="box-text" x="660" y="584">scheduled_factor_search / API experiments</text>
  <text class="box-text" x="660" y="607">islands + walkforward + pipeline</text>
  <text class="box-text" x="660" y="630">L0-L3 validation → review_queue / experiment_log</text>

  <!-- Workflow promote -->
  <rect class="auto" x="1185" y="530" width="510" height="135" rx="12"/>
  <text class="box-title" x="1210" y="557">workflow 深度验证与入册</text>
  <text class="box-text" x="1210" y="584">from_factory → promote.py</text>
  <text class="box-text" x="1210" y="607">phase1_synthetic → phase2_backtest → phase3_wf</text>
  <text class="box-text" x="1210" y="630">phase4_register → strategy_registry</text>

  <!-- NLP and audit automation -->
  <rect class="auto" x="85" y="700" width="365" height="105" rx="12"/>
  <text class="box-title" x="110" y="727">report_nlp_pipeline</text>
  <text class="box-text" x="110" y="754">research_pdf → DeepSeek adapter</text>
  <text class="box-text" x="110" y="777">research_signals → 因子候选</text>
  <rect class="auto" x="500" y="700" width="360" height="105" rx="12"/>
  <text class="box-title" x="525" y="727">workflow/explore.py</text>
  <text class="box-text" x="525" y="754">候选集合并行探索</text>
  <text class="box-text" x="525" y="777">phase1/2/3 fan-out report</text>
  <rect class="auto" x="910" y="700" width="360" height="105" rx="12"/>
  <text class="box-title" x="935" y="727">run_nine_gates_all.py</text>
  <text class="box-text" x="935" y="754">core.analysis.nine_gates</text>
  <text class="box-text" x="935" y="777">DSR/PSR/OOS/Stress → report</text>
  <rect class="auto" x="1320" y="700" width="375" height="105" rx="12"/>
  <text class="box-title" x="1345" y="727">受控动作 API</text>
  <text class="box-text" x="1345" y="754">services/actions/autoresearch*</text>
  <text class="box-text" x="1345" y="777">jobs / action_guard / audit trail</text>

  <path class="arrow-auto" d="M335 530 V412"/>
  <path class="arrow-auto" d="M885 530 V412"/>
  <path class="arrow-auto" d="M1135 598 H1185"/>
  <path class="arrow-auto" d="M450 752 H500"/>
  <path class="arrow-auto" d="M860 752 H910"/>
  <path class="arrow-auto" d="M1270 752 H1320"/>

  <!-- Registry and runtime -->
  <rect class="layer" x="55" y="880" width="1690" height="135"/>
  <text class="section-title" x="80" y="912">4. 登记、生产与运行控制</text>
  <rect class="registry" x="85" y="935" width="320" height="56" rx="10"/>
  <text class="box-title" x="105" y="958">strategy_registry.py</text>
  <text class="box-text" x="105" y="978">唯一策略台账写入口 / strategy_versions.json</text>
  <rect class="prod" x="455" y="935" width="280" height="56" rx="10"/>
  <text class="box-title" x="475" y="958">production runtime</text>
  <text class="box-text" x="475" y="978">run_daily / paper_engine / launchd</text>
  <rect class="prod" x="785" y="935" width="245" height="56" rx="10"/>
  <text class="box-title" x="805" y="958">portfolio/</text>
  <text class="box-text" x="805" y="978">optimizer / risk_model / composer</text>
  <rect class="risk" x="1080" y="935" width="245" height="56" rx="10"/>
  <text class="box-title" x="1100" y="958">execution/</text>
  <text class="box-text" x="1100" y="978">pre_trade / router / simulator / tca</text>
  <rect class="risk" x="1375" y="935" width="160" height="56" rx="10"/>
  <text class="box-title" x="1395" y="958">model_risk/</text>
  <text class="box-text" x="1395" y="978">approval / inventory</text>
  <rect class="store" x="1570" y="935" width="130" height="56" rx="10"/>
  <text class="box-title" x="1590" y="958">outputs</text>
  <text class="box-text" x="1590" y="978">signals / paper / logs</text>
  <path class="arrow-auto" d="M1440 665 V935 H405"/>
  <path class="arrow-prod" d="M335 665 V935 H455"/>
  <path class="arrow" d="M735 963 H785"/>
  <path class="arrow" d="M1030 963 H1080"/>
  <path class="arrow-thin" d="M1325 963 H1375"/>
  <path class="arrow-thin" d="M1535 963 H1570"/>

  <!-- Service layer -->
  <rect class="layer" x="55" y="1045" width="1690" height="90"/>
  <text class="section-title" x="80" y="1078">5. 服务与界面</text>
  <rect class="core" x="300" y="1060" width="310" height="52" rx="10"/>
  <text class="box-title" x="320" y="1082">services/</text>
  <text class="box-text" x="320" y="1102">read / actions / agent</text>
  <rect class="core" x="670" y="1060" width="380" height="52" rx="10"/>
  <text class="box-title" x="690" y="1082">FastAPI api.routers</text>
  <text class="box-text" x="690" y="1102">strategies / experiments / portfolio / risk / paper</text>
  <rect class="core" x="1110" y="1060" width="300" height="52" rx="10"/>
  <text class="box-title" x="1130" y="1082">web/ Next.js</text>
  <text class="box-text" x="1130" y="1102">overview / data / risk / experiments</text>
  <path class="arrow" d="M595 991 V1060 H610"/>
  <path class="arrow" d="M610 1086 H670"/>
  <path class="arrow" d="M1050 1086 H1110"/>

  <!-- Cross-layer arrows -->
  <path class="arrow-thin dash" d="M1510 805 V935 H1535"/>
  <path class="arrow-thin dash" d="M1090 805 V935 H405"/>
  <path class="arrow-thin dash" d="M268 805 V840 H210 V935"/>
  <path class="arrow-thin dash" d="M1568 240 V700 H450"/>

  <!-- Legend -->
  <rect class="store" x="1180" y="38" width="20" height="14" rx="3"/>
  <text class="small" x="1208" y="50">灰: 基础模块</text>
  <rect class="auto" x="1320" y="38" width="20" height="14" rx="3"/>
  <text class="small" x="1348" y="50">绿: 自动化</text>
  <rect class="registry" x="1435" y="38" width="20" height="14" rx="3"/>
  <text class="small" x="1463" y="50">黄: 台账</text>
  <rect class="prod" x="1545" y="38" width="20" height="14" rx="3"/>
  <text class="small" x="1573" y="50">橙: 生产</text>
</svg>
