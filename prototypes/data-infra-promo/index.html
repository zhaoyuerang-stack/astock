<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Quant OS Data Infrastructure Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
        color: #F5F5F7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      [data-composition-id="main"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
      }
      .scene-slot {
        position: absolute;
        inset: 0;
      }
      .caption-layer {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }
      .caption {
        position: absolute;
        left: 190px;
        right: 190px;
        bottom: 52px;
        display: flex;
        justify-content: center;
      }
      .caption-text {
        max-width: 1280px;
        padding: 18px 30px;
        border: 1px solid rgba(245, 245, 247, 0.16);
        border-radius: 8px;
        background: rgba(28, 28, 30, 0.86);
        color: #F5F5F7;
        font-size: 32px;
        line-height: 1.32;
        font-weight: 650;
        text-align: center;
        box-shadow: 0 26px 60px rgba(0, 0, 0, 0.42);
      }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-e9gu" data-composition-id="main" data-start="0" data-duration="60" data-width="1920" data-height="1080">
      <audio id="narration" src="narration.wav" data-start="0" data-duration="60" data-track-index="0" data-volume="1"></audio>

      <div data-hf-id="hf-liwt" id="scene-1" class="scene-slot" data-composition-id="scene-1-data-first" data-composition-src="compositions/scene-1-data-first.html" data-start="0" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>
      <div data-hf-id="hf-y79j" id="scene-2" class="scene-slot" data-composition-id="scene-2-source-registry" data-composition-src="compositions/scene-2-source-registry.html" data-start="10" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>
      <div data-hf-id="hf-7lz3" id="scene-3" class="scene-slot" data-composition-id="scene-3-data-lake" data-composition-src="compositions/scene-3-data-lake.html" data-start="20" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>
      <div data-hf-id="hf-oqaf" id="scene-4" class="scene-slot" data-composition-id="scene-4-pit-lock" data-composition-src="compositions/scene-4-pit-lock.html" data-start="30" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>
      <div data-hf-id="hf-0i0n" id="scene-5" class="scene-slot" data-composition-id="scene-5-guards" data-composition-src="compositions/scene-5-guards.html" data-start="40" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>
      <div data-hf-id="hf-edd3" id="scene-6" class="scene-slot" data-composition-id="scene-6-method" data-composition-src="compositions/scene-6-method.html" data-start="50" data-duration="10" data-track-index="1" data-width="1920" data-height="1080"></div>

      <div data-hf-id="hf-q4ix" id="caption-track" class="caption-layer" data-composition-id="captions" data-start="0" data-duration="60" data-track-index="2" data-width="1920" data-height="1080">
        <div data-hf-id="hf-gsc6" class="caption">
          <div data-hf-id="hf-fbzx" id="caption-text" class="caption-text">一个量化系统，最先该搭的，不是策略页面。</div>
        </div>
        <script>
          window.__timelines = window.__timelines || {};
          var captionTl = gsap.timeline({ paused: true });
          var caption = document.querySelector("#caption-text");
          var lines = [
            { t: 0.35, end: 4.65, text: "一个量化系统，最先该搭的，不是策略页面。是数据地基。" },
            { t: 4.95, end: 9.35, text: "如果数据源、字段、时间线和口径没有被管住，任何漂亮回测，都只是幻觉。" },
            { t: 10.4, end: 19.1, text: "先把数据源注册成可审计接口；职责写进声明，而不是散落在脚本里。" },
            { t: 20.4, end: 29.0, text: "落成数据湖：原始价、复权价、财务长表、交易日历、股票池和 manifest 分层保存。" },
            { t: 30.4, end: 39.0, text: "锁住时间：公告日对齐，盘后数据 shift(1)，估值使用不复权价格。" },
            { t: 40.4, end: 49.0, text: "质量闸门先拦机器错误。宁可 blocked，也不假装 ready。" },
            { t: 50.4, end: 59.0, text: "统一加载层服务研究：注册源，沉淀湖，锁时间，跑守卫，再服务研究。" }
          ];
          lines.forEach(function (line) {
            captionTl.set(caption, { innerText: line.text, visibility: "visible" }, line.t);
            captionTl.fromTo(caption, { y: 28, opacity: 0 }, { y: 0, opacity: 1, duration: 0.42, ease: "power3.out", immediateRender: false, overwrite: "auto" }, line.t);
            captionTl.to(caption, { y: -16, opacity: 0, duration: 0.24, ease: "power2.in", overwrite: "auto" }, line.end);
            captionTl.set(caption, { opacity: 0, visibility: "hidden" }, line.end + 0.25);
          });
          window.__timelines["captions"] = captionTl;
        </script>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var mainTl = gsap.timeline({ paused: true });
      ["#scene-1", "#scene-2", "#scene-3", "#scene-4", "#scene-5"].forEach(function (id, i) {
        mainTl.to(id, { opacity: 0, duration: 0.28, ease: "power2.in" }, (i + 1) * 10 - 0.32);
      });
      ["#scene-2", "#scene-3", "#scene-4", "#scene-5", "#scene-6"].forEach(function (id, i) {
        mainTl.fromTo(id, { opacity: 0 }, { opacity: 1, duration: 0.28, ease: "power2.out" }, (i + 1) * 10);
      });
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
