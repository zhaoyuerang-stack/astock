    <script>
      window.__timelines = window.__timelines || {};
      var c = document.getElementById("grid-canvas"), ctx = c.getContext("2d"), proxy = { t: 0 };
      function draw(t){ ctx.clearRect(0,0,1920,1080); ctx.strokeStyle="rgba(10,132,255,.16)"; ctx.lineWidth=1; for(var x=-200;x<1920;x+=80){ctx.beginPath();ctx.moveTo(x+t*22,880);ctx.lineTo(x+520+t*22,1080);ctx.stroke();} for(var y=720;y<1080;y+=42){ctx.beginPath();ctx.moveTo(0,y+t*10);ctx.lineTo(1920,y+t*10);ctx.stroke();} }

      tl.to(proxy,{t:1,duration:10,ease:"none",onUpdate:function(){draw(proxy.t);}},0);

      tl.to(".headline,.risk-strip,.foundation,.brand,.desk-wrap",{y:-130,filter:"blur(18px)",opacity:0,duration:.34,ease:"power2.in"},9.55);
      window.__timelines["scene-1-data-first"] = tl;
    </script>
