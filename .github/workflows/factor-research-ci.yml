name: factor-research canonical verification

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: factor-research-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: factor_research/pyproject.toml
      - name: Install project and test dependencies
        run: python -m pip install --disable-pip-version-check -e "factor_research[dev]"
      - name: Run canonical verification
        run: bash factor_research/scripts/test_all.sh
